<!--
  Send arrow: a solid right-pointing triangle with a convex (outward-bulging)
  left edge, sliced by a flat horizontal cut that starts at the curved edge
  and stops short of the tip.

  Built as three separate solid shapes (not one shape with a hole) so there's
  no fill-rule="evenodd" trickery to get wrong:
    1. top wing    - everything above the cut
    2. bottom wing - everything below the cut (mirror of the top wing)
    3. tip wedge   - the solid triangle point past the end of the cut

  They're drawn edge-to-edge so they read as one shape. To keep it that way,
  any point shared between two subpaths (e.g. the cut's start/end corners,
  the tip wedge's left corners) must be edited in both places at once.

  Quick tweaks (edit the same value in both the top-wing and bottom-wing
  subpaths, which are vertical mirrors of each other around y=12):
    - Overall height (vertex y):     2.085 / 21.915
    - Curve bulge (control point x): 1.078
    - Leftmost point of the curve:   1.004 (x of the curve's end / cut's start)
    - Cut thickness:                 11.504 / 12.496 (move both, symmetrically, to resize)
    - Where the cut ends (right edge of the cut, start of the tip wedge): 18.6
      (paired with 9.868 / 14.134, the y where that x crosses the top/bottom edges)
    - Tip sharpness (how far the flat tip extends): 21.5 (also appears in the tip wedge)
    - Tip flat edge thickness:        11.273 / 12.729 (move both, symmetrically, to resize)
    - Tip vertical center:           12 (also appears in the tip wedge)

  The left curve is a quadratic Bezier subdivided at the cut's top/bottom
  edges, so the two curve segments (top wing's and bottom wing's) line up
  exactly. If you resize the cut thickness, recompute the curve control
  points and endpoints together, or the curve will show a visible kink where
  the two wings meet.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="0">
  <path
    d="M2.549 2.085 Q1.078 6.795 1.004 11.504 L18.6 11.504 L18.6 9.868 Z
       M1.004 12.496 Q1.078 17.206 2.549 21.915 L18.6 14.134 L18.6 12.496 Z
       M18.6 9.868 L21.5 11.273 L21.5 12.729 L18.6 14.134 Z"
  />
</svg>
