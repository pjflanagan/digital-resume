<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna -->
  <circle cx="50" cy="8" r="3" stroke="currentColor" stroke-width="0.8" fill="none" vector-effect="non-scaling-stroke" />
  <line x1="50" y1="11" x2="50" y2="28" stroke="currentColor" stroke-width="1.2" vector-effect="non-scaling-stroke" />
  <ellipse cx="50" cy="28" rx="5" ry="1.5" stroke="currentColor" stroke-width="0.8" fill="none" vector-effect="non-scaling-stroke" />

  <!-- Head Outline / Dome -->
  <path d="M 32,74 L 32,44 C 32,28 68,28 68,44 L 68,74 Z" stroke="currentColor" stroke-width="0.8" fill="none" vector-effect="non-scaling-stroke" />
  <ellipse cx="50" cy="74" rx="18" ry="4" stroke="currentColor" stroke-width="0.8" fill="none" vector-effect="non-scaling-stroke" />

  <!-- Visor / Goggles -->
  <rect x="28" y="40" width="44" height="14" rx="7" ry="7" stroke="currentColor" stroke-width="0.8" fill="none" vector-effect="non-scaling-stroke" />
  
  <!-- Eyes -->
  <rect x="34" y="44" width="7" height="6" stroke="currentColor" stroke-width="0.6" fill="none" vector-effect="non-scaling-stroke" />
  <rect x="59" y="44" width="7" height="6" stroke="currentColor" stroke-width="0.6" fill="none" vector-effect="non-scaling-stroke" />
  
  <!-- Pupils (Centered) -->
  <rect x="36.5" y="46" width="2" height="2" fill="currentColor" />
  <rect x="61.5" y="46" width="2" height="2" fill="currentColor" />

  <!-- Mouth/Teeth Grille -->
  <path d="M 35,63 C 35,74 65,74 65,63 Z" stroke="currentColor" stroke-width="0.8" fill="none" vector-effect="non-scaling-stroke" />
  
  <!-- Vertical teeth divider lines -->
  <line x1="41" y1="64.5" x2="41" y2="69" stroke="currentColor" stroke-width="0.6" vector-effect="non-scaling-stroke" />
  <line x1="47" y1="65.5" x2="47" y2="70.5" stroke="currentColor" stroke-width="0.6" vector-effect="non-scaling-stroke" />
  <line x1="53" y1="65.5" x2="53" y2="70.5" stroke="currentColor" stroke-width="0.6" vector-effect="non-scaling-stroke" />
  <line x1="59" y1="64.5" x2="59" y2="69" stroke="currentColor" stroke-width="0.6" vector-effect="non-scaling-stroke" />
  
  <!-- Horizontal teeth divider -->
  <path d="M 35,67 C 39,68.5 61,68.5 65,67" stroke="currentColor" stroke-width="0.6" fill="none" vector-effect="non-scaling-stroke" />

  <!-- Neck Ring Collar -->
  <path d="M 28,78 C 28,84 72,84 72,78" stroke="currentColor" stroke-width="1.2" fill="none" vector-effect="non-scaling-stroke" />
  <ellipse cx="50" cy="78" rx="22" ry="4" stroke="currentColor" stroke-width="1" fill="none" vector-effect="non-scaling-stroke" />
  
  <!-- Technical Overlay Elements (Grid indicators) -->
  <line x1="20" y1="47" x2="26" y2="47" stroke="currentColor" stroke-width="0.4" vector-effect="non-scaling-stroke" />
  <line x1="74" y1="47" x2="80" y2="47" stroke="currentColor" stroke-width="0.4" vector-effect="non-scaling-stroke" />
  <text x="50" y="88" font-size="3" font-family="monospace" text-anchor="middle" fill="currentColor">UNIT: BENDER-B.R.</text>
  <text x="50" y="93" font-size="2" font-family="monospace" text-anchor="middle" fill="currentColor" opacity="0.6">CODE: 1B-DIAG-652</text>
</svg>
