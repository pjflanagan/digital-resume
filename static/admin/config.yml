backend:
  name: github
  repo: pjflanagan/digital-resume
  branch: main
  # Netlify acts as the OAuth provider (Site configuration -> Access & security -> OAuth -> GitHub)
  base_url: https://api.netlify.com

# Decap commits directly to main; each save is one commit touching only content/,
# which the netlify.toml ignore command skips building. That applies to media
# uploads too: images live in content/images/* and are served from raw GitHub
# at runtime, so new images appear without a redeploy.
media_folder: content/images
public_folder: https://raw.githubusercontent.com/pjflanagan/digital-resume/main/content/images

# Uncomment to edit locally with `npx decap-server` alongside `npm run develop`:
# local_backend: true

collections:
  - name: site
    label: Site Content
    files:
      - name: splash
        label: Splash
        file: content/0.0-splash.json
        fields:
          - { name: title, label: Title, widget: string }
          - { name: subtitle, label: Subtitle, widget: string }
          - name: prompts
            label: Scroll Prompts
            widget: list
            field: { name: prompt, label: Prompt, widget: string }

      - name: personal
        label: Personal
        file: content/1.0-personal.json
        fields:
          - name: defaultImage
            label: Default Photo
            widget: image
            media_folder: /content/images/personal
            public_folder: https://raw.githubusercontent.com/pjflanagan/digital-resume/main/content/images/personal
          - { name: accent, label: Accent, widget: string }
          - name: titleText
            label: Title Text
            widget: object
            fields:
              - { name: text, label: Text, widget: string }
              - name: links
                label: Links
                widget: list
                fields: &hover_link_fields
                  - { name: key, label: Key, widget: string }
                  - { name: href, label: Href, widget: string, required: false }
                  - { name: text, label: Text, widget: string }
                  - name: image
                    label: Hover Image
                    widget: image
                    required: false
                    media_folder: /content/images/personal
                    public_folder: https://raw.githubusercontent.com/pjflanagan/digital-resume/main/content/images/personal
                  - name: focusArea
                    label: Image Focus Area
                    widget: object
                    required: false
                    fields:
                      - { name: x, label: X, widget: number, value_type: int }
                      - { name: y, label: Y, widget: number, value_type: int }
                      - { name: width, label: Width, widget: number, value_type: int }
                      - { name: height, label: Height, widget: number, value_type: int }
                  - name: imageDescription
                    label: Hover Image Description
                    widget: text
                    required: false
                  - name: greeting
                    label: Hover Greeting
                    widget: string
                    required: false
          - name: linkText
            label: Body Text
            widget: object
            fields:
              - name: text
                label: Text (blank line = new paragraph)
                widget: text
              - name: links
                label: Links
                widget: list
                fields: *hover_link_fields

      - name: experience
        label: Experience Intro
        file: content/2.0-experience.json
        fields:
          - { name: accent, label: Accent, widget: string }
          - { name: title, label: Title, widget: string }
          - name: sections
            label: Section Headings
            widget: list
            field: { name: section, label: Section, widget: string }
          - name: linkText
            label: Intro Text
            widget: object
            fields: &link_text_fields
              - name: text
                label: Paragraphs
                widget: list
                field: { name: paragraph, label: Paragraph, widget: text }
              - name: links
                label: Links
                widget: list
                fields: &link_fields
                  - { name: key, label: Key, widget: string }
                  - { name: href, label: Href, widget: string, required: false }
                  - { name: text, label: Text, widget: string }

      - name: jobs
        label: Jobs
        file: content/2.1-jobs.json
        fields:
          - name: featured
            label: Featured Jobs
            widget: list
            fields: &job_fields
              - { name: name, label: Name, widget: string }
              - { name: location, label: Location, widget: string }
              - { name: time, label: Time, widget: string }
              - { name: position, label: Position, widget: string }
              - name: image
                label: Image
                widget: image
                media_folder: /content/images/experience
                public_folder: https://raw.githubusercontent.com/pjflanagan/digital-resume/main/content/images/experience
              - name: description
                label: Description
                widget: list
                required: false
                field: { name: item, label: Item, widget: text }
              - name: description_hidden
                label: Hidden Description (behind Show More)
                widget: list
                required: false
                field: { name: item, label: Item, widget: text }
              - name: links
                label: Links
                widget: list
                required: false
                fields: *link_fields
              - { name: background, label: Background Color, widget: string }
              - { name: color, label: Accent Color, widget: string }
          - name: other
            label: Other Jobs
            widget: list
            fields: *job_fields

      - name: schools
        label: Schools
        file: content/2.2-schools.json
        fields:
          - name: featured
            label: Featured Schools
            widget: list
            fields: &school_fields
              - { name: name, label: Name, widget: string }
              - { name: location, label: Location, widget: string }
              - { name: class, label: Class, widget: string }
              - { name: degree, label: Degree, widget: string, required: false }
              - name: image
                label: Image
                widget: image
                required: false
                media_folder: /content/images/experience
                public_folder: https://raw.githubusercontent.com/pjflanagan/digital-resume/main/content/images/experience
              - name: description
                label: Description
                widget: list
                required: false
                field: { name: item, label: Item, widget: text }
              - name: links
                label: Links
                widget: list
                required: false
                fields: *link_fields
              - { name: background, label: Background Color, widget: string }
              - { name: color, label: Accent Color, widget: string }
              - name: extra
                label: Extracurriculars
                widget: list
                required: false
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: position, label: Position, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: link, label: Link, widget: string, required: false }
          - name: other
            label: Other Schools
            widget: list
            fields: *school_fields
          - name: hidden
            label: Hidden Schools
            widget: list
            fields: *school_fields

      - name: skills
        label: Skills
        file: content/2.3-skills.json
        fields:
          - name: groups
            label: Skill Groups
            widget: list
            fields:
              - { name: type, label: Type, widget: string }
              - { name: cols, label: Columns, widget: number, value_type: int, min: 1, max: 3 }
              - name: items
                label: Skills
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: progress, label: Progress, widget: number, value_type: int, min: 0, max: 100 }

      - name: projects
        label: Projects
        file: content/3.0-projects.json
        fields:
          - { name: accent, label: Accent, widget: string }
          - { name: title, label: Title, widget: string }
          - name: sections
            label: Section Headings
            widget: list
            field: { name: section, label: Section, widget: string }
          - name: linkText
            label: Intro Text
            widget: object
            fields: *link_text_fields
          - name: featured
            label: Featured Projects
            widget: list
            fields: &project_fields
              - { name: name, label: Name, widget: string }
              - { name: type, label: Type, widget: string }
              - { name: link, label: Link, widget: string }
              - { name: description, label: Description, widget: text }
              - name: image
                label: Image
                widget: image
                media_folder: /content/images/projects
                public_folder: https://raw.githubusercontent.com/pjflanagan/digital-resume/main/content/images/projects
              - name: tech
                label: Tech
                widget: list
                required: false
                field: { name: item, label: Item, widget: string }
          - name: all
            label: Other Projects
            widget: list
            fields: *project_fields

      - name: contact
        label: Contact
        file: content/4.0-contact.json
        fields:
          - { name: accent, label: Accent, widget: string }
          - { name: title, label: Title, widget: string }
          - { name: text, label: Text, widget: text }
          - name: links
            label: Links
            widget: list
            fields:
              - { name: icon, label: Icon, widget: select, options: [email, github, linkedin] }
              - { name: href, label: Href, widget: string }
              - { name: text, label: Text, widget: string }
          - name: formPlaceholders
            label: Form Placeholders
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: email, label: Email, widget: string }
              - { name: message, label: Message, widget: string }

      - name: footer
        label: Footer
        file: content/5.0-footer.json
        fields:
          - name: items
            label: Lines
            widget: list
            fields:
              - { name: text, label: Text, widget: string }
              - name: links
                label: Links
                widget: list
                fields: *link_fields

      - name: egg
        label: Sci-Fi Easter Egg
        file: content/6.0-egg.json
        fields:
          - name: references
            label: References
            widget: list
            summary: '{{name}}'
            fields:
              - { name: name, label: Movie / Show Name, widget: string }
              - name: description
                label: Reference Description
                widget: object
                required: false
                fields:
                  - name: text
                    label: Text
                    widget: string
                  - name: links
                    label: Links
                    widget: list
                    fields: *link_fields
              - name: eggs
                label: Eggs
                widget: list
                summary: '{{locationId}}'
                fields:
                  - { name: locationId, label: Location ID, widget: string }
                  - { name: egg, label: Explanation, widget: text }
          - name: locations
            label: Locations
            widget: list
            summary: '{{name}} ({{id}})'
            fields:
              - { name: id, label: ID (slug), widget: string }
              - { name: name, label: Site Location Name, widget: string }
              - { name: description, label: Description, widget: text, required: false }
